</footer><!-- Bootstrap JS --><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>

// Your YouTube API Key
const API_KEY = "AIzaSyCVABZyEblnmMa-eaKFaQ-QrvtRAqc9YBs";

async function loadVideos(topic) {
    const container = document.getElementById("videoContainer");
    container.innerHTML = "<p>Loading videos...</p>";

    try {
        const response = await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&q=${topic} history tutorial&type=video&key=${API_KEY}`
        );

        const data = await response.json();
        container.innerHTML = "";

        if (!data.items) {
            container.innerHTML = "<p class='text-danger'>No videos found.</p>";
            return;
        }

        data.items.forEach(video => {
            const videoId = video.id.videoId;
            const title = video.snippet.title;

            container.innerHTML += `
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                        <div class="card-body">
                            <h6>${title}</h6>
                        </div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        container.innerHTML = `
            <div class="alert alert-danger">
                Failed to load videos. Check API key and internet connection.
            </div>
        `;
        console.error(error);
    }
}

</script></body>
