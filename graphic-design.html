<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphic Design - StudyTube</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"><style>
body {
    background-color: #f5f7fb;
    font-family: 'Segoe UI', sans-serif;
}

.top-header {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: white;
    padding: 25px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.sidebar, .video-section {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.topic-btn:hover {
    background-color: #0d6efd;
    color: white;
}

footer {
    margin-top: 60px;
    padding: 20px;
    background-color: #212529;
    color: white;
    text-align: center;
}
</style></head><body><nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-play-circle-fill"></i> StudyTube
        </a>
        <span class="text-white">Designed by Harsh Chourasia</span>
    </div>
</nav><div class="top-header">
    <i class="bi bi-palette-fill"></i> Graphic Design
</div><div class="container-fluid mt-4">
    <div class="row"><!-- Videos -->
    <div class="col-lg-9 mb-4">
        <div class="video-section">
            <h4>Learning Videos</h4>
            <div id="videoContainer" class="row g-4 mt-2"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="col-lg-3">
        <div class="sidebar">
            <h5 class="text-center mb-3">Topics</h5>

            <div class="list-group">
                <button class="list-group-item topic-btn" onclick="loadVideos('photoshop tutorial')">Photoshop</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('illustrator tutorial')">Illustrator</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('canva design')">Canva</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('logo design')">Logo Design</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('typography design')">Typography</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('poster design')">Poster Design</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('branding design')">Branding</button>
                <button class="list-group-item topic-btn" onclick="loadVideos('ui ux design')">UI/UX</button>
            </div>
        </div>
    </div>

</div>

</div><footer>
    <p>© 2026 StudyTube | Harsh Chourasia</p>
</footer><script>

// NO API VERSION (100% WORKING)

function loadVideos(topic) {
    const container = document.getElementById("videoContainer");
    container.innerHTML = "";

    const videos = [
        `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(topic + ' tutorial')}`
    ];

    videos.forEach(url => {
        container.innerHTML += `
        <div class="col-12">
            <div class="card shadow">
                <iframe width="100%" height="400" src="${url}" allowfullscreen></iframe>
            </div>
        </div>
        `;
    });
}

// Load default videos
loadVideos('graphic design basics');

</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body>
</html>
