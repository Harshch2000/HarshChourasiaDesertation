<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphic Design - StudyTube</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
body {
    background-color: #f8f9fa;
    font-family: 'Segoe UI', sans-serif;
}

.top-header {
    background: linear-gradient(45deg, #212529, #343a40);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.sidebar, .video-section {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.card:hover {
    transform: scale(1.03);
    transition: 0.3s;
}

footer {
    margin-top: 60px;
    padding: 20px;
    background-color: #212529;
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow">
<div class="container">
    <a class="navbar-brand" href="index.html">
        <i class="bi bi-play-circle-fill"></i> StudyTube
    </a>

    <a href="index.html" class="btn btn-outline-light">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>
</nav>

<!-- Header -->
<div class="top-header">
    <i class="bi bi-palette-fill"></i> Graphic Design
</div>

<!-- Main -->
<div class="container-fluid mt-4">
<div class="row">

<!-- Videos -->
<div class="col-lg-9 mb-4">
<div class="video-section">
<h4>Learning Videos</h4>

<div id="videoContainer" class="row g-4 mt-2 text-center">
    <p class="text-muted">Select a topic to load videos</p>
</div>

</div>
</div>

<!-- Sidebar -->
<div class="col-lg-3">
<div class="sidebar">

<h5 class="text-center mb-3">Filter Topics</h5>

<div class="list-group">

<button class="list-group-item list-group-item-action" onclick="loadVideos('Photoshop tutorial')">
<i class="bi bi-image"></i> Photoshop
</button>

<button class="list-group-item list-group-item-action" onclick="loadVideos('Illustrator tutorial')">
<i class="bi bi-vector-pen"></i> Illustrator
</button>

<button class="list-group-item list-group-item-action" onclick="loadVideos('Canva design tutorial')">
<i class="bi bi-easel"></i> Canva
</button>

<button class="list-group-item list-group-item-action" onclick="loadVideos('Logo design tutorial')">
<i class="bi bi-award"></i> Logo Design
</button>

<button class="list-group-item list-group-item-action" onclick="loadVideos('Typography tutorial')">
<i class="bi bi-fonts"></i> Typography
</button>

<button class="list-group-item list-group-item-action" onclick="loadVideos('Poster design tutorial')">
<i class="bi bi-card-text"></i> Poster Design
</button>

<button class="list-group-item list-group-item-action" onclick="loadVideos('UI UX design tutorial')">
<i class="bi bi-phone"></i> UI/UX
</button>

</div>

</div>
</div>

</div>
</div>

<!-- Footer -->
<footer>
<p>© 2026 StudyTube | Founder: <strong>Harsh Chourasia</strong></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// 🔴 IMPORTANT: Replace with your working API key
const API_KEY = "AIzaSyCVABZyEblnmMa-eaKFaQ-QrvtRAqc9YBs";

async function loadVideos(topic) {
    const container = document.getElementById("videoContainer");

    container.innerHTML = `
        <div class="spinner-border text-dark mt-3"></div>
        <p>Loading videos...</p>
    `;

    try {
        const query = encodeURIComponent(topic + " graphic design");

        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=6&q=${query}&key=${API_KEY}`;

        const response = await fetch(url);
        const data = await response.json();

        if (data.error) {
            container.innerHTML = `
                <div class="alert alert-danger">
                    API Error: ${data.error.message}
                </div>
            `;
            return;
        }

        if (!data.items || data.items.length === 0) {
            container.innerHTML = "<p>No videos found.</p>";
            return;
        }

        container.innerHTML = "";

        data.items.forEach(video => {
            const videoId = video.id.videoId;
            const title = video.snippet.title;

            container.innerHTML += `
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <iframe 
                            width="100%" 
                            height="200" 
                            src="https://www.youtube.com/embed/${videoId}" 
                            allowfullscreen>
                        </iframe>
                        <div class="card-body">
                            <h6>${title}</h6>
                        </div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        container.innerHTML = `
            <div class="alert alert-danger">
                Failed to load videos. Check API key / internet.
            </div>
        `;
        console.error(error);
    }
}

</script>

</body>
</html>
